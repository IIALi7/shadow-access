<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Shadow Access</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #020617;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            background-color: #0b1120;
            border-radius: 12px;
            padding: 24px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #1f2937;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.7);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .role {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 16px;
        }
        .flag-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #22c55e;
            background-color: #022c22;
            font-family: "JetBrains Mono", "Fira Code", monospace;
        }
        .error-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #b91c1c;
            background-color: #450a0a;
            font-size: 0.95rem;
        }
        code {
            background-color: #020617;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .links {
            margin-top: 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Admin Panel</h1>
    <div class="role">Role detected: <code>{{ role }}</code></div>

    {% if is_admin and flag %}
        <div class="flag-box">
            FLAG: {{ flag }}
        </div>
    {% else %}
        <div class="error-box">
            Access denied.  
            Only users with elevated client-side roles may view this area.
        </div>
    {% endif %}

    <div class="links">
        <p>➜ Back to profile: <a href="{{ url_for('profile') }}">/profile</a></p>
        <p>➜ Back to login: <a href="{{ url_for('index') }}">/</a></p>
    </div>
</div>
</body>
</html>
