<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Access - Login</title>
    <style>
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color-scheme: light;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #e0f2fe 0, #eef2ff 30%, #f9fafb 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background-color: #ffffff;
            border-radius: 18px;
            padding: 28px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 15px 40px rgba(15, 23, 42, 0.12),
                0 0 0 1px rgba(148, 163, 184, 0.15);
        }
        .title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #4f46e5;
            letter-spacing: 0.03em;
        }
        .subtitle {
            margin-top: 6px;
            color: #6b7280;
            font-size: 0.95rem;
        }
        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #374151;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background-color: #f9fafb;
            color: #111827;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px #6366f1;
            background-color: #ffffff;
        }
        button {
            margin-top: 18px;
            width: 100%;
            padding: 10px 16px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            color: white;
            font-weight: 600;
            font-size: 0.98rem;
            letter-spacing: 0.02em;
        }
        button:hover {
            filter: brightness(1.05);
        }
        .hint {
            margin-top: 14px;
            font-size: 0.83rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">Shadow Access</div>
    <div class="subtitle">
        Welcome to the student portal. Your identity is remembered
        using simple data stored in your browser.
    </div>

    <form method="post" action="/">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="e.g. ali_student">

        <button type="submit">Login</button>
    </form>

    
</div>
</body>
</html>
