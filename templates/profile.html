<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Shadow Access</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #020617;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            background-color: #0b1120;
            border-radius: 12px;
            padding: 24px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #1f2937;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.7);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .info {
            margin-top: 8px;
            font-size: 0.95rem;
        }
        code {
            background-color: #020617;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .links {
            margin-top: 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Hello, {{ username }}</h1>
    <div class="subtitle">Basic profile information stored using browser data.</div>

    <div class="info">
        <strong>Current role:</strong> <code>{{ role }}</code>
    </div>

    <div class="info" style="margin-top: 12px;">
        Some internal areas rely on stored client-side roles
        for determining privileged access.
    </div>

    <div class="links">
        <p>➜ Try accessing the admin section: <a href="{{ url_for('admin') }}">/admin</a></p>
        <p>➜ Back to login: <a href="{{ url_for('index') }}">/</a></p>
    </div>
</div>
</body>
</html>
