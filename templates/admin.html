<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Shadow Access</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff, #e0f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            background-color: #ffffff;
            border-radius: 18px;
            padding: 26px 30px;
            max-width: 520px;
            width: 100%;
            box-shadow:
                0 15px 40px rgba(15, 23, 42, 0.15),
                0 0 0 1px rgba(148, 163, 184, 0.18);
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #4f46e5;
        }
        .flag-box {
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #22c55e;
            background-color: #ecfdf3;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            color: #166534;
            font-size: 0.95rem;
        }
        .error-box {
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #f97316;
            background-color: #fff7ed;
            font-size: 0.95rem;
            color: #9a3412;
        }
        .links {
            margin-top: 18px;
            font-size: 0.9rem;
        }
        a {
            color: #2563eb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Admin Panel</h1>

    {% if is_admin and flag %}
        <div class="flag-box">
            FLAG: {{ flag }}
        </div>
    {% else %}
        <div class="error-box">
            Access to this section is restricted to a small set of internal accounts.
            If you arrived here accidentally, you can go back to the normal portal view.
        </div>
    {% endif %}

    <div class="links">
        <p>➜ Back to profile: <a href="{{ url_for('profile') }}">/profile</a></p>
        <p>➜ Back to login: <a href="{{ url_for('index') }}">/</a></p>
    </div>
</div>
</body>
</html>
